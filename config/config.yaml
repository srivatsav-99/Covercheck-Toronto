# CoverCheck Toronto - Main Pipeline Configuration

data:
  split_date: "2024-01-01"
  surge_threshold_pct: 0.90
  forecast_horizons: [1, 2]

models:
  lgbm:
    surge:
      learning_rate: 0.04
      num_leaves: 31
      subsample: 0.8
    nbhd:
      learning_rate: 0.04
      num_leaves: 47
      subsample: 0.8